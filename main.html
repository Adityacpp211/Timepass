<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday, Lakshmi!</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: {
                            50: '#f0f7f0', 100: '#d4e8d4', 200: '#a8d5a8',
                            300: '#6db56d', 400: '#4a8f4a', 500: '#2d6b2d',
                            600: '#1e4d1e', 700: '#163a16', 800: '#0f2a0f', 900: '#0a1f0a',
                        },
                        mountain: {
                            50: '#f5f7fa', 100: '#e4e9f0', 200: '#c8d3e0',
                            300: '#8fa4be', 400: '#5a7a9e', 500: '#3d5a7e',
                            600: '#2d4563', 700: '#1e3048', 800: '#131f30', 900: '#0a1018',
                        },
                        dawn: { 100: '#fff5eb', 200: '#ffe4cc', 300: '#ffc999', 400: '#ffad66', 500: '#ff8c33' },
                        snow: '#f8fafc',
                        gold: '#d4af37',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                        handwriting: ['Caveat', 'cursive']
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- GSAP + ScrollTrigger for game-like scroll animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background: #0a1018;
            color: #f5f7fa;
            overflow-x: hidden;
        }

        /* ===== SCROLL PROGRESS BAR ===== */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            z-index: 9999;
            background: linear-gradient(90deg, #2d6b2d, #6db56d, #d4af37, #ff8c33);
            transform-origin: left;
            will-change: transform;
        }

        /* ===== NAV ===== */
        .nature-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            transition: background 0.4s, box-shadow 0.4s;
            padding: 0;
        }

        .nature-nav.scrolled {
            background: rgba(10, 16, 24, 0.88);
            backdrop-filter: blur(18px) saturate(1.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.45);
        }

        .nav-link {
            position: relative;
            color: #c8d3e0;
            text-decoration: none;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 6px 0;
            transition: color 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #6db56d, #d4af37);
            transition: width 0.35s, left 0.35s;
            border-radius: 2px;
        }

        .nav-link:hover {
            color: #6db56d;
        }

        .nav-link:hover::after {
            width: 100%;
            left: 0;
        }

        .nav-link.active {
            color: #d4af37;
        }

        .nav-link.active::after {
            width: 100%;
            left: 0;
            background: #d4af37;
        }

        .surprise-btn {
            background: linear-gradient(135deg, #2d6b2d, #1e4d1e);
            color: #d4e8d4;
            border: 1px solid rgba(109, 181, 109, 0.3);
            padding: 7px 16px;
            border-radius: 99px;
            font-size: 0.62rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(45, 107, 45, 0.3);
        }

        .surprise-btn:hover {
            background: linear-gradient(135deg, #4a8f4a, #2d6b2d);
            box-shadow: 0 6px 25px rgba(45, 107, 45, 0.5);
            transform: translateY(-2px);
        }

        /* ===== HERO PARALLAX ===== */
        .hero-wrap {
            position: relative;
            height: 200vh;
            /* Scroll distance for the zoom + text fade effect */
        }

        .hero-pin {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #0a1018;
        }

        .hero-text-wrap {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .hero-text-wrap>* {
            pointer-events: auto;
        }

        /* ===== NATURE CARDS ===== */
        .nature-card {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: box-shadow 0.4s;
        }

        .nature-card:hover {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .nature-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .nature-card:hover img {
            transform: scale(1.08);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(10, 16, 24, 0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .nature-card:hover .card-overlay {
            opacity: 1;
        }

        /* ===== HORIZONTAL JOURNEY ===== */
        .journey-wrap {
            overflow: hidden;
        }

        .journey-track {
            display: flex;
            flex-wrap: nowrap;
            will-change: transform;
        }

        .journey-panel {
            flex: 0 0 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .journey-panel img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== MESSAGE CARD ===== */
        .msg-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 28px 24px;
            transition: transform 0.3s, border-color 0.3s, background 0.3s;
        }

        .msg-card:hover {
            transform: translateY(-6px);
            border-color: rgba(109, 181, 109, 0.35);
            background: rgba(109, 181, 109, 0.06);
        }

        /* ===== FLOATING PARTICLES ===== */
        .particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== MISC ===== */
        .text-gradient {
            background: linear-gradient(90deg, #6db56d, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .line-gradient {
            background: linear-gradient(90deg, transparent, #6db56d, #d4af37, transparent);
        }

        .section-dark {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        gsap.registerPlugin(ScrollTrigger);

        /* =============================================================
           FLOATING PARTICLE SYSTEM (fireflies / dust motes)
           ============================================================= */
        function ParticleField() {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];
                const resize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
                resize();
                window.addEventListener('resize', resize);

                for (let i = 0; i < 50; i++) {
                    particles.push({
                        x: Math.random() * w, y: Math.random() * h,
                        r: 1 + Math.random() * 2,
                        dx: (Math.random() - 0.5) * 0.3,
                        dy: -0.2 - Math.random() * 0.3,
                        alpha: Math.random(),
                        phase: Math.random() * Math.PI * 2,
                        color: Math.random() > 0.5 ? '212,175,55' : '109,181,109',
                    });
                }

                let raf;
                const draw = () => {
                    ctx.clearRect(0, 0, w, h);
                    particles.forEach(p => {
                        p.x += p.dx; p.y += p.dy;
                        p.phase += 0.015;
                        const a = (Math.sin(p.phase) * 0.5 + 0.5) * 0.5;
                        if (p.y < -10) { p.y = h + 10; p.x = Math.random() * w; }
                        if (p.x < -10) p.x = w + 10;
                        if (p.x > w + 10) p.x = -10;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${p.color},${a})`;
                        ctx.shadowColor = `rgba(${p.color},${a * 0.6})`;
                        ctx.shadowBlur = 8;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    });
                    raf = requestAnimationFrame(draw);
                };
                draw();
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
            }, []);

            return <canvas ref={canvasRef} className="particle-canvas" />;
        }

        /* =============================================================
           SCROLL PROGRESS BAR
           ============================================================= */
        function ScrollProgress() {
            const barRef = useRef(null);
            useEffect(() => {
                gsap.to(barRef.current, {
                    scaleX: 1,
                    ease: 'none',
                    scrollTrigger: { trigger: 'body', start: 'top top', end: 'bottom bottom', scrub: 0.3 }
                });
            }, []);
            return <div ref={barRef} className="scroll-progress" style={{ transform: 'scaleX(0)' }} />;
        }

        /* =============================================================
           NAV
           ============================================================= */
        function Nav() {
            const [scrolled, setScrolled] = useState(false);
            const [active, setActive] = useState('home');

            useEffect(() => {
                const onScroll = () => {
                    setScrolled(window.scrollY > 80);
                    for (const id of ['messages', 'gallery', 'story', 'home']) {
                        const el = document.getElementById(id);
                        if (el && window.scrollY >= el.offsetTop - 350) { setActive(id); break; }
                    }
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);

            const links = [
                { id: 'home', label: 'Home' }, { id: 'story', label: 'Our Story' },
                { id: 'gallery', label: 'Gallery' }, { id: 'messages', label: 'Messages' },
            ];

            return (
                <nav className={`nature-nav ${scrolled ? 'scrolled' : ''}`}>
                    <div className="max-w-6xl mx-auto flex items-center justify-between px-5 py-3">
                        <a href="#home" className="flex items-center gap-2 no-underline">
                            <svg className="w-7 h-7" fill="#6db56d" viewBox="0 0 24 24">
                                <path d="M12 2L2 22h20L12 2zm0 4l7 14H5l7-14z" opacity="0.6" />
                                <path d="M12 6l-5 10h10L12 6z" />
                            </svg>
                            <span className="font-serif text-sm tracking-wider hidden sm:inline" style={{ color: '#a8d5a8' }}>For Anya</span>
                        </a>
                        <div className="flex items-center gap-4 md:gap-7">
                            {links.map(l => (
                                <a key={l.id} href={'#' + l.id} className={`nav-link ${active === l.id ? 'active' : ''}`}>{l.label}</a>
                            ))}
                            <a href="index.html" className="surprise-btn">Surprise 🎁</a>
                        </div>
                    </div>
                </nav>
            );
        }

        /* =============================================================
           HERO — Single mountain photo with 3D depth effect
           Mouse-tracking tilt + scroll zoom for immersive 3D feel
           ============================================================= */
        function Hero() {
            const wrapRef = useRef(null);
            const sceneRef = useRef(null);
            const imgRef = useRef(null);
            const textRef = useRef(null);
            const shineRef = useRef(null);

            useEffect(() => {
                const scene = sceneRef.current;
                const img = imgRef.current;
                const shine = shineRef.current;
                if (!scene) return;

                /* --- Mouse-tracking 3D tilt --- */
                const handleMouse = (e) => {
                    const rect = scene.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;   // 0..1
                    const y = (e.clientY - rect.top) / rect.height;  // 0..1
                    const tiltX = (y - 0.5) * -12;  // ±6 degrees
                    const tiltY = (x - 0.5) * 12;
                    scene.style.transform = `perspective(1200px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
                    // Light reflection follows mouse
                    if (shine) {
                        shine.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255,255,255,0.12) 0%, transparent 60%)`;
                    }
                };
                const handleLeave = () => {
                    scene.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
                    if (shine) shine.style.background = 'transparent';
                };

                window.addEventListener('mousemove', handleMouse);
                scene.addEventListener('mouseleave', handleLeave);

                /* --- GSAP scroll: zoom image + fade text --- */
                const ctx = gsap.context(() => {
                    gsap.to(img, {
                        scale: 1.35,
                        y: -60,
                        ease: 'none',
                        scrollTrigger: {
                            trigger: wrapRef.current,
                            start: 'top top',
                            end: 'bottom top',
                            scrub: 1.5,
                        }
                    });
                    gsap.to(textRef.current, {
                        y: -250,
                        opacity: 0,
                        scale: 0.9,
                        ease: 'none',
                        scrollTrigger: {
                            trigger: wrapRef.current,
                            start: 'top top',
                            end: '40% top',
                            scrub: 1,
                        }
                    });
                }, wrapRef);

                return () => {
                    ctx.revert();
                    window.removeEventListener('mousemove', handleMouse);
                    scene.removeEventListener('mouseleave', handleLeave);
                };
            }, []);

            return (
                <div ref={wrapRef} className="hero-wrap" id="home">
                    <div className="hero-pin">
                        {/* 3D Scene container — tilts on mouse move */}
                        <div ref={sceneRef} style={{
                            position: 'absolute', inset: '-30px',
                            transformStyle: 'preserve-3d',
                            transition: 'transform 0.15s ease-out',
                            willChange: 'transform',
                        }}>
                            {/* Single mountain photo */}
                            <img
                                ref={imgRef}
                                src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=2000&q=85"
                                alt="Mountain landscape"
                                style={{
                                    width: '100%', height: '100%',
                                    objectFit: 'cover', objectPosition: 'center 40%',
                                    display: 'block',
                                    filter: 'brightness(0.55) saturate(1.25) contrast(1.1)',
                                    transform: 'translateZ(-50px) scale(1.08)',
                                    willChange: 'transform',
                                }}
                            />

                            {/* Light reflection that follows mouse */}
                            <div ref={shineRef} style={{
                                position: 'absolute', inset: 0,
                                pointerEvents: 'none',
                                transition: 'background 0.3s ease-out',
                                zIndex: 2,
                            }} />
                        </div>

                        {/* Depth fog at base */}
                        <div style={{
                            position: 'absolute', bottom: 0, left: 0, right: 0,
                            height: '40%', zIndex: 3,
                            background: 'linear-gradient(180deg, transparent 0%, rgba(10,16,24,0.5) 40%, rgba(10,16,24,0.85) 70%, #0a1018 100%)',
                            pointerEvents: 'none',
                        }} />

                        {/* Vignette for 3D depth feel */}
                        <div style={{
                            position: 'absolute', inset: 0, zIndex: 3,
                            boxShadow: 'inset 0 0 200px 80px rgba(10,16,24,0.6)',
                            pointerEvents: 'none',
                        }} />

                        {/* Top dark gradient */}
                        <div style={{
                            position: 'absolute', top: 0, left: 0, right: 0,
                            height: '25%', zIndex: 3,
                            background: 'linear-gradient(180deg, rgba(10,16,24,0.6) 0%, transparent 100%)',
                            pointerEvents: 'none',
                        }} />

                        {/* Floating text — sits above the 3D scene */}
                        <div className="hero-text-wrap" style={{ zIndex: 15 }}>
                            <div ref={textRef} className="px-6 max-w-3xl" style={{
                                transform: 'translateZ(80px)',
                                transformStyle: 'preserve-3d',
                            }}>
                                <p className="font-sans text-xs md:text-sm tracking-[0.3em] uppercase mb-5"
                                    style={{ color: '#a8d5a8', textShadow: '0 2px 30px rgba(0,0,0,0.7)' }}>
                                    Celebrating you happiiiiieeeest birthday
                                </p>
                                <h1 className="font-serif text-5xl md:text-7xl lg:text-9xl font-bold leading-[0.92] mb-6"
                                    style={{ textShadow: '0 6px 60px rgba(0,0,0,0.7), 0 2px 10px rgba(0,0,0,0.5)' }}>
                                    <span style={{ color: '#f8fafc' }}>HAPPY</span><br />
                                    <span style={{ color: '#f8fafc' }}>BIRTHDAY,</span><br />
                                    <span className="text-gradient">Lakshmi</span>
                                </h1>
                                <div className="w-20 h-[2px] mx-auto mb-5 line-gradient" />
                                <p className="font-sans text-sm md:text-base max-w-md mx-auto leading-relaxed"
                                    style={{ color: '#c8d3e0', textShadow: '0 2px 20px rgba(0,0,0,0.6)' }}>
                                    Cheers to the girl who makes every day brighter.
                                </p>
                                <div className="mt-12 flex flex-col items-center gap-2 animate-bounce">
                                    <span className="text-[10px] tracking-widest uppercase" style={{ color: '#8fa4be' }}>Scroll to explore</span>
                                    <svg className="w-5 h-5" fill="none" stroke="#6db56d" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* =============================================================
           STORY — scroll-triggered cinematic text reveal
           ============================================================= */
        function Story() {
            const sectionRef = useRef(null);
            const imgRef = useRef(null);
            const wordsRef = useRef([]);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    // Image slides in from left
                    gsap.from(imgRef.current, {
                        x: -200, opacity: 0, scale: 0.85, rotate: -5,
                        scrollTrigger: { trigger: sectionRef.current, start: 'top 75%', end: 'top 30%', scrub: 1 }
                    });

                    // Each word fades in one by one
                    wordsRef.current.forEach((el, i) => {
                        if (!el) return;
                        gsap.from(el, {
                            opacity: 0.08, y: 20, filter: 'blur(4px)',
                            scrollTrigger: { trigger: el, start: 'top 85%', end: 'top 60%', scrub: 1 }
                        });
                    });
                }, sectionRef);
                return () => ctx.revert();
            }, []);

            const storyWords = `It's funny how life works sometimes. A random message, and a conversation that was supposed to be about work somehow became one of the most meaningful parts of my college life. I still remember being the quiet, distant guy who barely talked to anyone, while you somehow found a way to keep talking and pulling me out of my shell. What started as a team for a competition slowly became countless conversations, laughter, and memories I never expected to make. You were there during a time when I was carrying a lot within myself, and without even realizing it, you helped me smile more, open up more, and start healing from things I rarely spoke about. Looking back, some of my happiest moments from these past year have your presence in them. Thank you for being patient with my silence, for understanding me when I couldn't explain myself, and for making ordinary days feel special. On your birthday, I just want you to know that our journey means a lot to me, and I genuinely feel lucky that one simple "Will you join my team?" turned into what we are now, that I will always cherish. I admire your passion in learning everything, I like all those photographs you take all those drawing you draw. I hope this year brings you all the happiness, success, peace, and beautiful moments that you deserve. I will always pray for your success. Happy Birthday, Artist . ❤️`.split(' ');

            return (
                <section id="story" ref={sectionRef} className="section-dark py-24 md:py-32"
                    style={{ background: 'linear-gradient(180deg, #0a1018 0%, #131f30 100%)' }}>
                    <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center gap-12 md:gap-16">
                        {/* Image with scroll animation */}
                        <div ref={imgRef} className="flex-1 relative">
                            <div className="rounded-2xl overflow-hidden shadow-2xl border border-white/5">
                                <img src="assets/we.jpg"
                                    alt="Our Journey" className="w-full h-72 md:h-[420px] object-cover" />
                            </div>
                            <div className="absolute -bottom-4 -right-4 md:-bottom-6 md:-right-6 bg-forest-600 text-forest-100 rounded-full w-20 h-20 md:w-24 md:h-24 flex items-center justify-center shadow-xl border-2 border-forest-400/30">
                                <span className="font-handwriting text-xl md:text-2xl text-center leading-tight">Our<br />Story</span>
                            </div>
                        </div>

                        {/* Text — word-by-word scroll reveal */}
                        <div className="flex-1 text-center md:text-left">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase text-forest-300 mb-3">The Journey So Far</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-8 leading-tight">
                                Through Every<br />Season Together
                            </h2>
                            <div className="w-16 h-[2px] mx-auto md:mx-0 mb-8 line-gradient" />
                            <p className="font-sans text-sm md:text-base leading-[2.2] flex flex-wrap gap-x-[5px]" style={{ color: '#c8d3e0' }}>
                                {storyWords.map((word, i) => (
                                    <span key={i} ref={el => wordsRef.current[i] = el}
                                        className="inline-block transition-all">{word}</span>
                                ))}
                            </p>
                            <p className="font-sans text-sm italic mt-6" style={{ color: '#8fa4be' }}>
                                "The mountains are calling, and we must go — together."
                            </p>
                        </div>
                    </div>
                </section>
            );
        }

        /* =============================================================
           GALLERY — cards fly in with stagger + 3D tilt on scroll
           ============================================================= */
        function Gallery() {
            const gridRef = useRef(null);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    const cards = gridRef.current.querySelectorAll('.gallery-card');
                    cards.forEach((card, i) => {
                        const fromLeft = i % 2 === 0;
                        gsap.from(card, {
                            x: fromLeft ? -120 : 120,
                            y: 80,
                            opacity: 0,
                            rotateY: fromLeft ? 15 : -15,
                            scale: 0.8,
                            scrollTrigger: {
                                trigger: card,
                                start: 'top 90%',
                                end: 'top 50%',
                                scrub: 1,
                            }
                        });
                    });
                }, gridRef);
                return () => ctx.revert();
            }, []);

            const photos = [
                { src: 'assets/Screenshot 2026-06-08 184922.png', title: 'Summit Dreams', sub: 'The peaks at dawn' },
                { src: 'assets/Screenshot 2026-06-08 184934.png', title: 'Golden Valley', sub: 'A path through light' },
                { src: 'assets/Screenshot 2026-06-08 184952.png', title: 'Forest Whispers', sub: 'Mist and memory' },
                { src: 'assets/Screenshot 2026-06-08 185005.png', title: 'Meadow Light', sub: 'Where wildflowers bloom' },
                { src: 'assets/Screenshot 2026-06-08 185017.png', title: 'Alpine Glow', sub: 'Ice and fire above' },
                { src: 'assets/Screenshot 2026-06-08 185027.png', title: 'Hidden Falls', sub: "Nature's secret" },
            ];

            return (
                <section id="gallery" className="section-dark py-24 md:py-32"
                    style={{ background: 'linear-gradient(180deg, #131f30 0%, #0f2a0f 50%, #0a1018 100%)' }}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase text-forest-300 mb-3">Through Your Lens</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-4">Gallery of Princess</h2>
                            <div className="w-16 h-[2px] mx-auto line-gradient" />
                        </div>
                        <div ref={gridRef} className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"
                            style={{ perspective: '1200px' }}>
                            {photos.map((p, i) => (
                                <div key={i} className="gallery-card nature-card aspect-[4/5]" style={{ transformStyle: 'preserve-3d' }}>
                                    <img src={p.src} alt={p.title} />
                                    <div className="card-overlay">
                                        <h4 className="font-serif text-lg text-white mb-1">{p.title}</h4>
                                        <p className="font-sans text-xs uppercase tracking-wider" style={{ color: '#c8d3e0' }}>{p.sub}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        /* =============================================================
           HORIZONTAL SCROLL JOURNEY — like walking through levels
           Vertical scrolling drives a horizontal camera pan
           ============================================================= */
        function HorizontalJourney() {
            const wrapRef = useRef(null);
            const trackRef = useRef(null);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    const panels = trackRef.current.querySelectorAll('.journey-panel');
                    gsap.to(trackRef.current, {
                        x: () => -(trackRef.current.scrollWidth - window.innerWidth),
                        ease: 'none',
                        scrollTrigger: {
                            trigger: wrapRef.current,
                            pin: true,
                            scrub: 1,
                            end: () => '+=' + trackRef.current.scrollWidth,
                        }
                    });

                    // Each panel content fades in
                    panels.forEach(panel => {
                        const content = panel.querySelector('.panel-content');
                        if (content) {
                            gsap.from(content, {
                                opacity: 0, y: 60, scale: 0.9,
                                scrollTrigger: {
                                    trigger: panel,
                                    containerAnimation: gsap.getById && undefined, // inline trigger
                                    start: 'left 80%',
                                    end: 'left 30%',
                                    scrub: 1,
                                    horizontal: true,
                                }
                            });
                        }
                    });
                }, wrapRef);
                return () => ctx.revert();
            }, []);

            const scenes = [
                {
                    img: 'assets/Screenshot 2026-06-08 185052.png',
                    title: 'The Journey Begins', sub: 'Where every step tells a story'
                },
                {
                    img: 'assets/Screenshot 2026-06-08 185107.png',
                    title: 'Under the Stars', sub: 'Moments of wonder and stillness'
                },
                {
                    img: 'assets/Screenshot 2026-06-08 185149.png',
                    title: 'Into the Forest', sub: 'Where light filters through memories'
                },
                {
                    img: 'assets/Screenshot 2026-06-08 185201.png',
                    title: 'Golden Horizon', sub: 'The best views come after the hardest climb'
                },
            ];

            return (
                <div ref={wrapRef} className="journey-wrap section-dark">
                    <div ref={trackRef} className="journey-track">
                        {scenes.map((s, i) => (
                            <div key={i} className="journey-panel">
                                <img src={s.img} alt={s.title} style={{ filter: 'brightness(0.4) saturate(1.2)' }} />
                                <div className="panel-content relative z-10 text-center px-8 max-w-lg">
                                    <p className="font-sans text-xs tracking-[0.3em] uppercase mb-4" style={{ color: '#6db56d' }}>
                                        Chapter {i + 1}
                                    </p>
                                    <h3 className="font-serif text-3xl md:text-5xl text-white mb-4">{s.title}</h3>
                                    <div className="w-12 h-[2px] mx-auto mb-4 line-gradient" />
                                    <p className="font-sans text-sm" style={{ color: '#c8d3e0' }}>{s.sub}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        /* =============================================================
           ART GALLERY — scale-in with rotation
           ============================================================= */
        function ArtGallery() {
            const wrapRef = useRef(null);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    const cards = wrapRef.current.querySelectorAll('.art-card');
                    cards.forEach((card, i) => {
                        gsap.from(card, {
                            scale: 0.5, opacity: 0, rotate: i === 0 ? -12 : i === 2 ? 12 : 0, y: 100,
                            scrollTrigger: { trigger: card, start: 'top 85%', end: 'top 45%', scrub: 1 }
                        });
                    });
                }, wrapRef);
                return () => ctx.revert();
            }, []);

            const artworks = [
                { src: 'assets/Screenshot 2026-06-08 185221.png', title: 'Abstract Mountains' },
                { src: 'assets/Screenshot 2026-06-08 185256.png', title: 'Color & Light' },
                { src: 'assets/Screenshot 2026-06-08 185323.png', title: 'Wilderness Sketch' },
            ];

            return (
                <section ref={wrapRef} className="section-dark py-24 md:py-32"
                    style={{ background: 'linear-gradient(180deg, #0a1018 0%, #1e3048 50%, #0a1018 100%)' }}>
                    <div className="max-w-5xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase mb-3" style={{ color: '#ffc999' }}>Your Canvas</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-4">Art Inspired by Nature</h2>
                            <div className="w-16 h-[2px] mx-auto" style={{ background: 'linear-gradient(90deg,transparent,#ffc999,#d4af37,transparent)' }} />
                        </div>
                        <div className="flex flex-col md:flex-row justify-center items-center md:items-end gap-8"
                            style={{ perspective: '1000px' }}>
                            {artworks.map((a, i) => (
                                <div key={i} className={`art-card nature-card ${i === 1 ? 'w-72 md:w-80 aspect-[3/4] z-20' : 'w-60 md:w-64 aspect-[3/4] z-10'}`}
                                    style={{ transform: i === 0 ? 'rotate(-3deg)' : i === 2 ? 'rotate(3deg)' : 'none' }}>
                                    <img src={a.src} alt={a.title} />
                                    <div className="card-overlay">
                                        <h4 className="font-serif text-base text-white">{a.title}</h4>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        /* =============================================================
           MEMORY GAME — matching cards with special pictures
           ============================================================= */
        function MemoryGame() {
            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matches, setMatches] = useState(0);
            const [moves, setMoves] = useState(0);

            const gameImages = [
                'assets/Screenshot 2026-06-08 184922.png',
                'assets/Screenshot 2026-06-08 184934.png',
                'assets/Screenshot 2026-06-08 184952.png',
                'assets/Screenshot 2026-06-08 185005.png',
                'assets/Screenshot 2026-06-08 185017.png',
                'assets/Screenshot 2026-06-08 185027.png'
            ];

            useEffect(() => {
                initializeGame();
            }, []);

            const initializeGame = () => {
                const shuffled = [...gameImages, ...gameImages]
                    .sort(() => Math.random() - 0.5)
                    .map((src, i) => ({ id: i, src, isFlipped: false, isMatched: false }));
                setCards(shuffled);
                setFlippedIndices([]);
                setMatches(0);
                setMoves(0);
            };

            const handleCardClick = (index) => {
                if (flippedIndices.length === 2) return;
                if (cards[index].isFlipped || cards[index].isMatched) return;

                const newCards = [...cards];
                newCards[index].isFlipped = true;
                setCards(newCards);

                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    setMoves(m => m + 1);
                    const [first, second] = newFlipped;
                    if (newCards[first].src === newCards[second].src) {
                        setTimeout(() => {
                            const matchedCards = [...newCards];
                            matchedCards[first].isMatched = true;
                            matchedCards[second].isMatched = true;
                            setCards(matchedCards);
                            setFlippedIndices([]);
                            setMatches(m => m + 1);
                        }, 500);
                    } else {
                        setTimeout(() => {
                            const resetCards = [...newCards];
                            resetCards[first].isFlipped = false;
                            resetCards[second].isFlipped = false;
                            setCards(resetCards);
                            setFlippedIndices([]);
                        }, 1000);
                    }
                }
            };

            return (
                <section id="game-memory" className="py-24 md:py-32" style={{ background: 'linear-gradient(180deg, #0a1018 0%, #131f30 100%)' }}>
                    <div className="max-w-4xl mx-auto px-6 relative z-10">
                        <div className="text-center mb-12">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase text-forest-300 mb-3">A Playful Pause</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-4">Memories Game</h2>
                            <p className="text-sm text-gray-400 mb-6 font-sans">Find the matching memories. Moves: {moves}</p>
                            <div className="w-16 h-[2px] mx-auto line-gradient mb-8" />
                        </div>

                        <div className="grid grid-cols-3 md:grid-cols-4 gap-3 md:gap-6" style={{ perspective: '1000px' }}>
                            {cards.map((card, i) => (
                                <div key={card.id}
                                    onClick={() => handleCardClick(i)}
                                    className="relative aspect-square cursor-pointer"
                                    style={{ transformStyle: 'preserve-3d', transition: 'transform 0.6s', transform: card.isFlipped || card.isMatched ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>

                                    <div className="absolute inset-0 bg-forest-800 rounded-xl border border-forest-600 flex items-center justify-center shadow-lg hover:bg-forest-700 transition-colors"
                                        style={{ backfaceVisibility: 'hidden' }}>
                                        <svg className="w-8 h-8 text-forest-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                    </div>

                                    <div className="absolute inset-0 rounded-xl overflow-hidden"
                                        style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}>
                                        <img src={card.src} className="w-full h-full object-cover" alt="memory" />
                                        {card.isMatched && (
                                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                                                <svg className="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>

                        {matches === 6 && (
                            <div className="mt-12 text-center animate-fade-in">
                                <h3 className="text-2xl text-snow font-serif mb-4">You found all the memories! 🎉</h3>
                                <button onClick={initializeGame} className="px-6 py-2 bg-forest-600 text-white rounded-full hover:bg-forest-500 transition-colors tracking-widest text-sm uppercase">Play Again</button>
                            </div>
                        )}
                    </div>
                </section>
            );
        }

        /* =============================================================
           FIREFLY CATCHER — interactive mini-game
           ============================================================= */
        function FireflyGame() {
            const [score, setScore] = useState(0);
            const [fireflies, setFireflies] = useState([]);
            const [isPlaying, setIsPlaying] = useState(false);
            const [timeLeft, setTimeLeft] = useState(30);
            const gameAreaRef = useRef(null);

            const startGame = () => {
                setScore(0);
                setTimeLeft(30);
                setIsPlaying(true);
                setFireflies([]);
            };

            useEffect(() => {
                if (!isPlaying) return;

                const timerId = setInterval(() => {
                    setTimeLeft(t => {
                        if (t <= 1) {
                            setIsPlaying(false);
                            return 0;
                        }
                        return t - 1;
                    });
                }, 1000);

                const spawnerId = setInterval(() => {
                    if (!gameAreaRef.current) return;
                    const rect = gameAreaRef.current.getBoundingClientRect();
                    const newFirefly = {
                        id: Date.now() + Math.random(),
                        x: Math.random() * (rect.width - 40),
                        y: Math.random() * (rect.height - 40),
                        size: Math.random() * 8 + 8
                    };
                    setFireflies(prev => [...prev, newFirefly]);

                    setTimeout(() => {
                        setFireflies(prev => prev.filter(f => f.id !== newFirefly.id));
                    }, 2500);

                }, 800);

                return () => {
                    clearInterval(timerId);
                    clearInterval(spawnerId);
                };
            }, [isPlaying]);

            const catchFirefly = (id, e) => {
                e.stopPropagation();
                if (!isPlaying) return;

                const el = document.createElement('div');
                el.className = 'absolute pointer-events-none text-2xl';
                el.style.left = (e.nativeEvent.offsetX - 10) + 'px';
                el.style.top = (e.nativeEvent.offsetY - 10) + 'px';
                el.innerHTML = '✨';
                e.currentTarget.parentNode.appendChild(el);
                gsap.to(el, { y: -50, opacity: 0, duration: 1, onComplete: () => el.remove() });

                setFireflies(prev => prev.filter(f => f.id !== id));
                setScore(s => s + 1);
            };

            return (
                <section id="game-firefly" className="py-24 md:py-32 relative overflow-hidden"
                    style={{ background: 'linear-gradient(180deg, #131f30 0%, #080d14 100%)' }}>
                    <div className="max-w-4xl mx-auto px-6 relative z-10">
                        <div className="text-center mb-10">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase text-yellow-500 mb-3">Evening Magic</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-4">Catch the Fireflies</h2>
                            <p className="text-sm text-gray-400 mb-6 font-sans">Tap the glowing lights before they disappear.</p>
                            <div className="flex justify-center gap-8 mb-6 font-serif">
                                <div className="text-xl text-yellow-400">Score: {score}</div>
                                <div className="text-xl text-blue-300">Time: {timeLeft}s</div>
                            </div>
                            {!isPlaying && (
                                <button onClick={startGame} className="px-8 py-3 bg-yellow-600 text-white rounded-full hover:bg-yellow-500 transition-colors shadow-[0_0_20px_rgba(202,138,4,0.4)] tracking-wider uppercase text-sm font-sans">
                                    {timeLeft === 0 && score > 0 ? 'Play Again' : 'Start Catching'}
                                </button>
                            )}
                        </div>

                        <div ref={gameAreaRef} className="w-full h-[400px] md:h-[500px] relative rounded-2xl overflow-hidden shadow-2xl border border-white/10"
                            style={{ background: 'url(https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1000&q=80) center/cover' }}>
                            <div className="absolute inset-0 bg-black/50" />

                            {isPlaying && fireflies.map(f => (
                                <div key={f.id}
                                    onClick={(e) => catchFirefly(f.id, e)}
                                    className="absolute cursor-pointer rounded-full bg-yellow-300 shadow-[0_0_15px_4px_rgba(253,224,71,0.8)] animate-pulse"
                                    style={{
                                        left: f.x, top: f.y,
                                        width: f.size, height: f.size,
                                        transition: 'all 0.3s ease-out'
                                    }}
                                />
                            ))}

                            {!isPlaying && timeLeft === 0 && score > 0 && (
                                <div className="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm">
                                    <h3 className="text-3xl md:text-4xl font-serif text-yellow-400 drop-shadow-lg text-center">
                                        You caught {score} fireflies! ✨
                                    </h3>
                                </div>
                            )}
                        </div>
                    </div>
                </section>
            );
        }

        /* =============================================================
           MESSAGES — stagger cascade animation
           ============================================================= */
        function Messages() {
            const gridRef = useRef(null);

            useEffect(() => {
                const ctx = gsap.context(() => {
                    const cards = gridRef.current.querySelectorAll('.msg-item');
                    gsap.from(cards, {
                        y: 60, opacity: 0, scale: 0.9,

                }, gridRef);
                return () => ctx.revert();
            }, []);

            const messages = [
                { text: 'You inspire me everyday!', author: 'Leo', emoji: '🏔️' },
                { text: 'Love your art & soul!', author: 'Min', emoji: '🌲' },
                { text: 'To many more adventures!', author: 'Sarah', emoji: '🌄' },
                { text: 'You light up every room!', author: 'Jay', emoji: '🌸' },
                { text: 'The world is better with you!', author: 'Riya', emoji: '🦋' },
                { text: 'Never stop creating!', author: 'Sam', emoji: '🌿' },
            ];

            return (
                <section id="messages" className="section-dark relative py-24 md:py-32 overflow-hidden"
                    style={{ background: 'linear-gradient(180deg, #0a1018 0%, #0f2a0f 50%, #0a1f0a 100%)' }}>
                    <div className="absolute inset-0 z-0">
                        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80"
                            alt="" className="w-full h-full object-cover opacity-[0.06]" />
                    </div>
                    <div className="relative z-10 max-w-5xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <p className="font-sans text-xs tracking-[0.25em] uppercase text-forest-300 mb-3">From Those Who Love You</p>
                            <h2 className="font-serif text-3xl md:text-5xl text-snow mb-4">Voices from the Valley</h2>
                            <div className="w-16 h-[2px] mx-auto line-gradient" />
                        </div>
                        <div ref={gridRef} className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {messages.map((m, i) => (
                                <div key={i} className="msg-item msg-card text-center">
                                    <div className="text-3xl mb-4">{m.emoji}</div>
                                    <p className="font-handwriting text-2xl md:text-3xl text-snow leading-snug mb-4">"{m.text}"</p>
                                    <p className="font-sans text-xs tracking-wider uppercase" style={{ color: '#6db56d' }}>— {m.author}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        /* =============================================================
           FOOTER
           ============================================================= */
        function Footer() {
            return (
                <footer className="section-dark relative text-center pt-0 pb-12" style={{ background: '#0a1f0a' }}>
                    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" className="w-full h-24 md:h-40" style={{ marginBottom: '-1px' }}>
                        <path fill="#0a1018" d="M0,0 L0,200 L1440,200 L1440,0 Q1320,60 1200,30 T960,80 T720,20 T480,70 T240,25 T0,0Z" />
                        <path fill="#0a1f0a" d="M0,80 Q180,30 360,70 T720,40 T1080,75 T1440,50 L1440,200 L0,200Z" />
                    </svg>
                    <div className="relative z-10 -mt-2">
                        <svg className="w-8 h-8 mx-auto mb-4" fill="#4a8f4a" viewBox="0 0 24 24">
                            <path d="M12 2L2 22h20L12 2zm0 4l7 14H5l7-14z" opacity="0.5" /><path d="M12 6l-5 10h10L12 6z" />
                        </svg>
                        <p className="font-sans text-xs tracking-widest uppercase mb-2" style={{ color: '#5a7a9e' }}>
                            &copy; 2026 For Lakshmi. With Love.
                        </p>
                        <p className="font-handwriting text-lg" style={{ color: '#4a8f4a' }}>
                            Because of your smile, you make life more beautiful. 🏔️
                        </p>
                    </div>
                </footer>
            );
        }

        /* =============================================================
           APP
           ============================================================= */
        function App() {
            return (
                <div className="relative font-sans antialiased">
                    <ParticleField />
                    <ScrollProgress />
                    <Nav />

                    <Story />
                    <Gallery />
                    <HorizontalJourney />

        const root = ReactDOM.createRoot(document.getElementById('root'));
