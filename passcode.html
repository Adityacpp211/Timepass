<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlock the Magic</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        beige: {
                            50: '#fdfbf7',
                            100: '#faf5eb',
                            200: '#f2e7d3',
                            300: '#e9d6b5',
                            400: '#dfbc8c',
                            500: '#d5a165',
                        },
                        brown: {
                            800: '#4a3d31',
                            900: '#3a2d21'
                        },
                        gold: '#d4af37'
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                        handwriting: ['Caveat', 'cursive']
                    },
                    boxShadow: {
                        'polaroid': '0 10px 25px rgba(0, 0, 0, 0.1)',
                        'polaroid-hover': '0 15px 35px rgba(0, 0, 0, 0.2)'
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #faf5eb;
            color: #3a2d21;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle watercolor texture overlay */
        .watercolor-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(135, 206, 235, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(245, 222, 179, 0.4) 0%, transparent 50%);
            pointer-events: none;
            filter: blur(12px);
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #8c6b5d;
            background-color: transparent;
            transition: all 0.2s ease;
        }

        .pin-dot.filled {
            background-color: #8c6b5d;
            transform: scale(1.2);
        }
    </style>
</head>

<body class="antialiased font-sans">
    <div class="watercolor-bg"></div>

    <div class="relative w-full max-w-md px-6 fade-in">

        <!-- Cute Decorative Elements -->
        <div
            class="absolute -top-12 -left-8 md:-left-12 rotate-[-15deg] z-10 w-24 h-24 bg-white p-2 pb-6 shadow-polaroid rounded-sm hidden sm:block">
            <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=200&q=80"
                class="w-full h-full object-cover" />
            <div class="absolute top-1 left-1/2 w-2 h-2 rounded-full bg-pink-400 transform -translate-x-1/2 shadow-sm">
            </div>
        </div>

        <div
            class="absolute -bottom-16 -right-6 md:-right-10 rotate-[10deg] z-10 w-28 h-28 bg-yellow-50 p-3 shadow-lg hidden sm:flex items-center justify-center">
            <p class="font-handwriting text-2xl text-brown-900 text-center leading-tight">Shh! It's a<br />secret!</p>
            <div class="absolute top-2 left-1/2 w-2 h-2 rounded-full bg-red-400 transform -translate-x-1/2 shadow-sm">
            </div>
        </div>

        <!-- Main Card -->
        <div id="passcode-card"
            class="bg-white/80 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-polaroid border border-white/50 relative z-20 flex flex-col items-center">

            <div
                class="w-20 h-20 bg-beige-100 rounded-full flex items-center justify-center mb-6 shadow-inner border border-beige-200">
                <svg class="w-10 h-10 text-[#d5a165]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>

            <h1 class="font-serif text-3xl text-brown-900 mb-2 text-center">Unlock the Magic</h1>
            <p id="instruction-text" class="font-sans text-sm text-gray-500 mb-8 text-center uppercase tracking-widest">Enter the secret date
            </p>

            <!-- Timer Container -->
            <div id="timer-container" class="hidden flex-col items-center w-full mb-4">
                <div class="flex gap-4 text-center">
                    <div class="bg-beige-100 rounded-xl p-3 w-16 md:w-20 shadow-inner border border-beige-200">
                        <span id="t-hours" class="font-serif text-2xl md:text-3xl text-brown-900">00</span>
                        <span class="text-[10px] uppercase tracking-wider text-brown-800/60 block mt-1">Hrs</span>
                    </div>
                    <div class="bg-beige-100 rounded-xl p-3 w-16 md:w-20 shadow-inner border border-beige-200">
                        <span id="t-minutes" class="font-serif text-2xl md:text-3xl text-brown-900">00</span>
                        <span class="text-[10px] uppercase tracking-wider text-brown-800/60 block mt-1">Min</span>
                    </div>
                    <div class="bg-beige-100 rounded-xl p-3 w-16 md:w-20 shadow-inner border border-beige-200">
                        <span id="t-seconds" class="font-serif text-2xl md:text-3xl text-brown-900">00</span>
                        <span class="text-[10px] uppercase tracking-wider text-brown-800/60 block mt-1">Sec</span>
                    </div>
                </div>
                <p class="font-handwriting text-xl text-brown-900 mt-8 text-center opacity-80">Patience is a virtue...</p>
            </div>

            <!-- Numpad Container -->
            <div id="numpad-container" class="flex flex-col items-center w-full">
                <!-- Pin Dots -->
                <div class="flex gap-4 mb-8">
                    <div class="pin-dot" id="dot-1"></div>
                    <div class="pin-dot" id="dot-2"></div>
                    <div class="pin-dot" id="dot-3"></div>
                    <div class="pin-dot" id="dot-4"></div>
                </div>

                <!-- Numpad -->
                <div class="grid grid-cols-3 gap-4 md:gap-6 w-full max-w-[250px]">
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="1">1</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="2">2</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="3">3</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="4">4</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="5">5</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="6">6</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="7">7</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="8">8</button>
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="9">9</button>
                    <div class="w-16 h-16"></div> <!-- Empty space -->
                    <button class="numpad-btn w-16 h-16 rounded-full bg-white hover:bg-beige-100 text-brown-800 text-2xl font-serif shadow-sm border border-beige-200 transition active:scale-90" data-val="0">0</button>
                    <button id="btn-clear" class="w-16 h-16 rounded-full flex justify-center items-center text-brown-800/50 hover:text-brown-800 transition active:scale-90">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path>
                        </svg>
                    </button>
                </div>

                <p id="error-msg" class="text-red-400 font-sans text-xs mt-6 opacity-0 transition-opacity uppercase tracking-widest">
                    Incorrect passcode</p>
                <p class="font-handwriting text-xl text-brown-900 mt-2 text-center opacity-70">Hint: June 10th (MMDD)</p>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date("2026-06-10T00:00:00").getTime();
        const timerContainer = document.getElementById('timer-container');
        const numpadContainer = document.getElementById('numpad-container');
        const instructionText = document.getElementById('instruction-text');
        let timerInterval;

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                clearInterval(timerInterval);
                timerContainer.classList.add('hidden');
                timerContainer.classList.remove('flex');
                numpadContainer.classList.add('flex');
                numpadContainer.classList.remove('hidden');
                instructionText.textContent = "Enter the secret date";
                return;
            }

            // Hide numpad, show timer
            timerContainer.classList.remove('hidden');
            timerContainer.classList.add('flex');
            numpadContainer.classList.remove('flex');
            numpadContainer.classList.add('hidden');
            instructionText.textContent = "Unlocks At Midnight";

            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("t-hours").textContent = hours.toString().padStart(2, '0');
            document.getElementById("t-minutes").textContent = minutes.toString().padStart(2, '0');
            document.getElementById("t-seconds").textContent = seconds.toString().padStart(2, '0');
        }

        timerInterval = setInterval(updateTimer, 1000);
        updateTimer(); // Initial call

        const CORRECT_PIN = "0610";
        let currentPin = "";

        const dots = [
            document.getElementById('dot-1'),
            document.getElementById('dot-2'),
            document.getElementById('dot-3'),
            document.getElementById('dot-4')
        ];
        const errorMsg = document.getElementById('error-msg');
        const card = document.getElementById('passcode-card');

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function handleInput(val) {
            if (currentPin.length < 4) {
                currentPin += val;
                updateDots();
                errorMsg.style.opacity = '0';

                if (currentPin.length === 4) {
                    checkPin();
                }
            }
        }

        function checkPin() {
            setTimeout(() => {
                if (currentPin === CORRECT_PIN) {
                    // Success!
                    card.style.transition = 'all 0.5s ease';
                    card.style.transform = 'scale(1.1)';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = 'main.html';
                    }, 500);
                } else {
                    // Error
                    card.classList.add('shake');
                    errorMsg.style.opacity = '1';
                    setTimeout(() => {
                        card.classList.remove('shake');
                        currentPin = "";
                        updateDots();
                    }, 500);
                }
            }, 300);
        }

        document.querySelectorAll('.numpad-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                handleInput(btn.getAttribute('data-val'));
            });
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            currentPin = currentPin.slice(0, -1);
            updateDots();
            errorMsg.style.opacity = '0';
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (numpadContainer.classList.contains('hidden')) return;

            if (e.key >= '0' && e.key <= '9') {
                handleInput(e.key);
            } else if (e.key === 'Backspace') {
                currentPin = currentPin.slice(0, -1);
                updateDots();
                errorMsg.style.opacity = '0';
            }
        });
    </script>
</body>

</html>
