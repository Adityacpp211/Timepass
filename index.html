```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flower Garden for You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Inter', sans-serif;
            touch-action: none;
            overscroll-behavior: none;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Hardware-accelerated gentle breathing */
        @keyframes breathe {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .grown-flower-anim {
            animation: breathe 3s ease-in-out infinite alternate;
            will-change: transform;
        }

        /* Particle system */
        @keyframes float-away {
            0% { transform: translate3d(0, 0, 0) scale(0); opacity: 1; }
            40% { opacity: 1; }
            100% { transform: translate3d(var(--tx), var(--ty), 0) scale(1.2); opacity: 0; }
        }

        .spore {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            will-change: transform, opacity;
            animation: float-away 2s ease-out forwards;
        }

        /* UI Fades */
        .fade-out {
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
        }
    </style>
</head>
<body>

    <!-- SVG Layer for drawing stems -->
    <svg id="garden-stems" class="fixed inset-0 w-full h-full pointer-events-none z-10 overflow-visible"></svg>
    
    <!-- Layer for Flower Heads -->
    <div id="flower-heads" class="fixed inset-0 w-full h-full pointer-events-none z-20"></div>

    <!-- Touch Catcher Layer -->
    <div id="touch-layer" class="fixed inset-0 w-full h-full cursor-pointer z-30"></div>

    <!-- UI Overlay Layer -->
    <div id="ui-layer" class="fixed inset-0 w-full h-full pointer-events-none z-40 flex flex-col justify-between p-6">
        
        <div class="text-white/90 font-serif text-lg md:text-xl tracking-wide flex items-center gap-2 drop-shadow-md">
            <span class="text-sm">🌸</span> Flower Garden for You
        </div>

        <div id="hero-text" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center transition-opacity duration-1000 w-full px-4">
            <p class="text-gray-300 text-sm md:text-base font-light mb-2">Click Anywhere to</p>
            <h1 class="font-serif text-5xl md:text-7xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 pb-2">
                Plant Flowers
            </h1>
            <p class="text-gray-400 text-sm mt-3 font-light">✨ or turn on Auto Bloom</p>
        </div>

        <div class="absolute bottom-10 md:bottom-12 left-1/2 -translate-x-1/2 pointer-events-auto">
            <div class="bg-[#2a2d2a]/80 backdrop-blur-md p-1.5 rounded-full flex gap-2 border border-white/10 shadow-[0_0_20px_rgba(0,0,0,0.5)]">
                <button id="btn-clear" class="px-5 py-2.5 rounded-full bg-[#526052]/60 hover:bg-[#526052] text-gray-200 text-xs md:text-sm transition-all active:scale-95 flex items-center gap-2 font-medium">
                    🧹 Clear Garden
                </button>
                <button id="btn-auto" class="px-5 py-2.5 rounded-full bg-[#526052]/60 hover:bg-[#526052] text-gray-200 text-xs md:text-sm transition-all active:scale-95 flex items-center gap-2 font-medium">
                    ✨ Auto Bloom
                </button>
            </div>
        </div>
    </div>

    <script>
        const svgCanvas = document.getElementById('garden-stems');
        const flowerHeadsLayer = document.getElementById('flower-heads');
        const touchLayer = document.getElementById('touch-layer');
        const heroText = document.getElementById('hero-text');
        const btnClear = document.getElementById('btn-clear');
        const btnAuto = document.getElementById('btn-auto');

        let isFirstFlower = true;
        let autoBloomInterval = null;
        let isAutoBlooming = false;

        function resizeCanvas() {
            svgCanvas.setAttribute('width', window.innerWidth);
            svgCanvas.setAttribute('height', window.innerHeight);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const palettes = [
            { id: 'lavender', center: '#fdf4ff', mid: '#d8b4fe', edge: '#818cf8', dot: '#fef08a' }, 
            { id: 'peach',    center: '#fffbeb', mid: '#fcd34d', edge: '#fb923c', dot: '#ffffff' }, 
            { id: 'violet',   center: '#e0e7ff', mid: '#c084fc', edge: '#6d28d9', dot: '#cffafe' }, 
            { id: 'rose',     center: '#ffe4e6', mid: '#f472b6', edge: '#e11d48', dot: '#fef08a' }  
        ];

        // NEW BULLETPROOF SVG GENERATOR
        function createOptimizedFlower(palette) {
            const id = Math.random().toString(36).substr(2, 9);
            
            // The petal base is strictly glued to 0,0. It curves up and back down to 0,0.
            const petalPath = "M 0 0 C -50 -40, -50 -100, 0 -100 C 50 -100, 50 -40, 0 0 Z";
            
            let backPetals = '';
            // 7 large overlapping background petals
            for(let i = 0; i < 7; i++) {
                const rot = i * (360 / 7);
                backPetals += `<path d="${petalPath}" fill="url(#grad_${id})" transform="rotate(${rot})" opacity="0.65"/>`;
            }

            let frontPetals = '';
            // 6 slightly smaller foreground petals
            for(let i = 0; i < 6; i++) {
                const rot = i * (360 / 6) + 30; // Offset rotation
                frontPetals += `<path d="${petalPath}" fill="url(#grad_${id})" transform="rotate(${rot}) scale(0.75)" opacity="0.85"/>`;
            }

            // Stamens strictly radiating from 0,0
            let stamens = '';
            for(let i = 0; i < 28; i++) {
                const angle = (Math.PI * 2 / 28) * i + (Math.random() * 0.1);
                const length = 25 + Math.random() * 20;
                
                const x2 = Math.cos(angle) * length;
                const y2 = Math.sin(angle) * length;
                
                // Curve control point
                const cx = Math.cos(angle - 0.2) * (length * 0.5);
                const cy = Math.sin(angle - 0.2) * (length * 0.5);
                
                stamens += `<path d="M 0 0 Q ${cx} ${cy} ${x2} ${y2}" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.8"/>`;
                stamens += `<circle cx="${x2}" cy="${y2}" r="1.5" fill="${palette.dot}"/>`;
            }

            // Entire structure is wrapped in <g transform="translate(100, 100)">
            return `
            <svg viewBox="0 0 200 200" style="width: 100%; height: 100%; overflow: visible; will-change: transform;">
                <defs>
                    <radialGradient id="grad_${id}" cx="50%" cy="100%" r="100%">
                        <stop offset="0%" stop-color="${palette.center}" stop-opacity="0.95"/>
                        <stop offset="50%" stop-color="${palette.mid}" stop-opacity="0.7"/>
                        <stop offset="100%" stop-color="${palette.edge}" stop-opacity="0.1"/>
                    </radialGradient>
                    <radialGradient id="core_${id}" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                        <stop offset="40%" stop-color="${palette.center}" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="${palette.center}" stop-opacity="0"/>
                    </radialGradient>
                </defs>
                
                <!-- Translate 100,100 anchors the 0,0 petal coordinates exactly in the middle -->
                <g transform="translate(100, 100)">
                    <g style="mix-blend-mode: screen;">
                        ${backPetals}
                        ${frontPetals}
                    </g>
                    <g>
                        ${stamens}
                    </g>
                    <!-- Glowing center overlapping the bases -->
                    <circle cx="0" cy="0" r="14" fill="url(#core_${id})" />
                </g>
            </svg>`;
        }

        function createSpores(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const spore = document.createElement('div');
                spore.className = 'spore';
                spore.style.width = Math.random() * 3 + 2 + 'px';
                spore.style.height = spore.style.width;
                spore.style.backgroundColor = Math.random() > 0.5 ? '#ffffff' : color;
                
                spore.style.left = `${x}px`;
                spore.style.top = `${y}px`;
                spore.style.marginLeft = '-2px';
                spore.style.marginTop = '-2px';

                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 40;
                spore.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                spore.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);

                flowerHeadsLayer.appendChild(spore);
                setTimeout(() => spore.remove(), 2000);
            }
        }

        function plantFlower(targetX, targetY) {
            if (isFirstFlower) {
                heroText.classList.add('fade-out');
                isFirstFlower = false;
            }

            const startX = targetX + (Math.random() * 60 - 30);
            const startY = window.innerHeight + 50;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const cp1x = startX + (targetX - startX) * 0.2 + (Math.random() * 80 - 40);
            const cp1y = startY - (startY - targetY) * 0.3;
            const cp2x = startX + (targetX - startX) * 0.8 + (Math.random() * 80 - 40);
            const cp2y = startY - (startY - targetY) * 0.7;

            path.setAttribute("d", `M ${startX},${startY} C ${cp1x},${cp1y} ${cp2x},${cp2y} ${targetX},${targetY}`);
            path.setAttribute("stroke", "rgba(167, 243, 208, 0.5)"); // Subtle ethereal stem
            path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-linecap", "round");
            
            svgCanvas.appendChild(path);

            const pathLength = path.getTotalLength();
            path.style.strokeDasharray = pathLength;
            path.style.strokeDashoffset = pathLength;

            const palette = palettes[Math.floor(Math.random() * palettes.length)];
            
            const flower = document.createElement('div');
            flower.style.position = 'absolute';
            flower.style.left = '0px';
            flower.style.top = '0px';
            flower.style.willChange = 'transform';
            
            const size = 160 + Math.random() * 50;
            flower.style.width = `${size}px`;
            flower.style.height = `${size}px`;
            
            const tiltX = 30 + Math.random() * 25; 
            const rotZ = Math.random() * 360;      
            
            flower.innerHTML = createOptimizedFlower(palette);
            flowerHeadsLayer.appendChild(flower);

            let startTime = null;
            const duration = 1200 + Math.random() * 400; 

            function animateGrowth(currentTime) {
                if (!startTime) startTime = currentTime;
                let progress = (currentTime - startTime) / duration;
                if (progress > 1) progress = 1;

                const easeOut = 1 - Math.pow(1 - progress, 3);

                path.style.strokeDashoffset = pathLength * (1 - easeOut);

                const point = path.getPointAtLength(pathLength * easeOut);
                
                // Pure hardware acceleration
                flower.style.transform = `translate3d(${point.x}px, ${point.y}px, 0) translate(-50%, -50%) rotateX(${tiltX}deg) rotateZ(${rotZ}deg) scale(${easeOut})`;

                if (progress < 1) {
                    requestAnimationFrame(animateGrowth);
                } else {
                    flower.children[0].classList.add('grown-flower-anim');
                    createSpores(point.x, point.y, palette.center);
                }
            }

            requestAnimationFrame(animateGrowth);
        }

        touchLayer.addEventListener('pointerdown', (e) => {
            if (e.clientY > window.innerHeight - 100) return;
            plantFlower(e.clientX, e.clientY);
        });

        btnClear.addEventListener('click', () => {
            svgCanvas.innerHTML = '';
            flowerHeadsLayer.innerHTML = '';
            
            if (!isAutoBlooming) {
                heroText.classList.remove('fade-out');
                isFirstFlower = true;
            }
        });

        btnAuto.addEventListener('click', () => {
            isAutoBlooming = !isAutoBlooming;
            
            if (isAutoBlooming) {
                btnAuto.innerHTML = "⏸ Pause Auto";
                btnAuto.classList.add('bg-purple-900/60');
                
                if (isFirstFlower) {
                    heroText.classList.add('fade-out');
                    isFirstFlower = false;
                }

                autoBloomInterval = setInterval(() => {
                    const randX = window.innerWidth * 0.1 + Math.random() * (window.innerWidth * 0.8);
                    const randY = window.innerHeight * 0.2 + Math.random() * (window.innerHeight * 0.5);
                    plantFlower(randX, randY);
                }, 600); 
            } else {
                btnAuto.innerHTML = "✨ Auto Bloom";
                btnAuto.classList.remove('bg-purple-900/60');
                clearInterval(autoBloomInterval);
            }
        });

    </script>
</body>
</html>
